<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ODL PDF WebUI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">OpenDataLoader PDF</p>
          <h1>本地 PDF 识别控制台</h1>
        </div>
        <div id="daemonBadge" class="badge">Daemon: unknown</div>
      </header>

      <section class="status-strip">
        <div>
          <span>Python</span>
          <strong id="pythonStatus">Checking</strong>
        </div>
        <div>
          <span>Java</span>
          <strong id="javaStatus">Checking</strong>
        </div>
        <div>
          <span>OpenDataLoader</span>
          <strong id="odlStatus">Checking</strong>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>目录</h2>
          <p>通过 macOS 原生选择器设置 PDF 文件和输出路径。</p>
        </div>
        <div class="path-grid">
          <label>
            <span>PDF 文件</span>
            <div class="path-control">
              <input id="inputDir" readonly placeholder="请选择一个或多个 PDF 文件" />
              <button id="pickInput" type="button">选择</button>
            </div>
          </label>
          <label>
            <span>默认输出目录</span>
            <div class="path-control">
              <input id="outputDir" readonly placeholder="默认写入 PDF 所在目录" />
              <button id="pickOutput" type="button">选择</button>
            </div>
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>转换设置</h2>
          <p>优先选择 Markdown 和 JSON，便于后续 RAG 或人工检查。</p>
        </div>
        <div class="format-grid">
          <label><input type="checkbox" name="format" value="markdown" checked /> Markdown</label>
          <label><input type="checkbox" name="format" value="json" checked /> JSON</label>
          <label><input type="checkbox" name="format" value="html" /> HTML</label>
          <label><input type="checkbox" name="format" value="text" /> Text</label>
          <label><input type="checkbox" name="format" value="pdf" /> PDF</label>
          <label><input type="checkbox" name="format" value="tagged-pdf" /> Tagged PDF</label>
        </div>
        <label class="select-row">
          <span>图片输出</span>
          <select id="imageOutput">
            <option value="off">不导出图片</option>
            <option value="external">导出 PNG 文件</option>
            <option value="embedded">嵌入到文档</option>
          </select>
        </label>
        <label class="toggle">
          <input id="useHybrid" type="checkbox" checked />
          <span>Daemon 运行时自动启用 hybrid 模式</span>
        </label>
      </section>

      <section class="actions">
        <button id="startDaemon" class="secondary" type="button">启动 daemon</button>
        <button id="stopDaemon" class="secondary danger" type="button">停止 daemon</button>
        <button id="convert" class="primary" type="button">开始识别 PDF</button>
        <button id="shutdownWebui" class="secondary danger" type="button">关闭 WebUI</button>
      </section>

      <section class="panel log-panel">
        <div class="panel-heading">
          <h2>任务日志</h2>
          <p id="jobState">尚未开始</p>
        </div>
        <pre id="logOutput">等待任务...</pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
